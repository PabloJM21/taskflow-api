# Test datasource — H2 in-memory
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=false
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# Let Hibernate create/drop the schema for tests (Flyway disabled)
spring.jpa.hibernate.ddl-auto=create-drop

# Disable Flyway for tests — migration scripts target PostgreSQL
spring.flyway.enabled=false

# JWT config (for tests)
app.jwt.secret=test-256-bit-secret-here-must-be-at-least-32-bytes-long-for-hs256
app.jwt.expiration=3600
